<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>YouTube Fact Checker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 280px;
      padding: 16px;
      background: #0f0f0f;
      color: #fff;
    }
    h2 {
      font-size: 16px;
      margin-bottom: 12px;
      color: #ff4444;
    }
    label {
      font-size: 12px;
      color: #aaa;
    }
    input {
      width: 100%;
      padding: 8px;
      margin: 6px 0 12px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #fff;
      font-size: 13px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 9px;
      background: #ff4444;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background: #cc0000;
    }
    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #4caf50;
      text-align: center;
    }
  </style>
</head>
<body>
  <h2>YouTube Fact Checker</h2>
  <label>Gemini API Key</label>
  <input type="password" id="apiKey" placeholder="Paste your API key here" />
  <button id="saveBtn">Save Key</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
